<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>कृषिMitra - लॉगिन</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated farmers in background */
        .farmer {
            position: absolute;
            font-size: 60px;
            animation: float 6s ease-in-out infinite;
            opacity: 0.3;
            z-index: 1;
        }

        .farmer:nth-child(1) {
            left: 10%;
            top: 20%;
            animation-delay: 0s;
        }

        .farmer:nth-child(2) {
            right: 15%;
            top: 30%;
            animation-delay: 2s;
        }

        .farmer:nth-child(3) {
            left: 20%;
            bottom: 15%;
            animation-delay: 4s;
        }

        .farmer:nth-child(4) {
            right: 10%;
            bottom: 25%;
            animation-delay: 1s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(-5deg);
            }
            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        /* Decorative crops */
        .crop {
            position: absolute;
            font-size: 40px;
            opacity: 0.2;
            animation: sway 4s ease-in-out infinite;
        }

        .crop:nth-child(5) { left: 5%; bottom: 10%; animation-delay: 0s; }
        .crop:nth-child(6) { right: 8%; top: 15%; animation-delay: 1s; }
        .crop:nth-child(7) { left: 25%; top: 10%; animation-delay: 2s; }
        .crop:nth-child(8) { right: 20%; bottom: 20%; animation-delay: 1.5s; }

        @keyframes sway {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        .login-container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
            z-index: 10;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            color: #56ab2f;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .tagline {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #56ab2f;
            box-shadow: 0 0 0 3px rgba(86, 171, 47, 0.1);
        }

        .send-otp-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .send-otp-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(86, 171, 47, 0.3);
        }

        .send-otp-btn:active {
            transform: translateY(0);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(86, 171, 47, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .otp-hint {
            margin-top: 8px;
            padding: 10px;
            background: #fff9e6;
            border-left: 4px solid #56ab2f;
            border-radius: 5px;
            font-size: 14px;
            color: #666;
        }

        .otp-hint strong {
            color: #56ab2f;
            font-size: 16px;
        }

        .farmer-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 40px 30px;
            }
            
            .logo {
                font-size: 36px;
            }

            .farmer {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background elements -->
    <div class="farmer">👨‍🌾</div>
    <div class="farmer">👩‍🌾</div>
    <div class="farmer">👨‍🌾</div>
    <div class="farmer">👩‍🌾</div>
    <div class="crop">🌾</div>
    <div class="crop">🌻</div>
    <div class="crop">🌾</div>
    <div class="crop">🌾</div>

    <div class="login-container">
        <div class="farmer-icon">👨‍🌾</div>
        <h1 class="logo">कृषिMitra</h1>
        <p class="tagline">किसानों का AI सहायक</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="mobile">मोबाइल नंबर दर्ज करें</label>
                <input type="tel" id="mobile" placeholder="10 अंकों का मोबाइल नंबर" maxlength="10" required>
            </div>
            
            <button type="button" class="send-otp-btn" id="sendOtpBtn">OTP भेजें</button>
            
            <div class="input-group" id="otpSection" style="display: none;">
                <label for="otp">OTP दर्ज करें</label>
                <input type="text" id="otp" placeholder="6 अंकों का OTP" maxlength="6">
                <p class="otp-hint">डेमो के लिए OTP: <strong>123456</strong></p>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn" style="display: none;">लॉगिन करें</button>
        </form>
        
        <div id="successMessage" style="display: none; margin-top: 15px; text-align: center;">
            <p style="color: #56ab2f; font-weight: bold; margin-bottom: 10px;">✅ लॉगिन सफल!</p>
            <a href="main.html" style="color: #56ab2f; text-decoration: underline; font-size: 14px;">अगर पेज नहीं खुला तो यहाँ क्लिक करें</a>
        </div>
    </div>

    <script>
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        const otpSection = document.getElementById('otpSection');
        const loginBtn = document.getElementById('loginBtn');
        const mobileInput = document.getElementById('mobile');
        const otpInput = document.getElementById('otp');

        // Send OTP button click
        sendOtpBtn.addEventListener('click', function() {
            const mobile = mobileInput.value;
            
            if (mobile.length === 10) {
                // Show OTP section and login button
                otpSection.style.display = 'block';
                loginBtn.style.display = 'block';
                sendOtpBtn.textContent = 'OTP फिर से भेजें';
                
                // Show success message
                alert('OTP भेज दिया गया है!\nडेमो OTP: 123456');
            } else {
                alert('कृपया 10 अंकों का मोबाइल नंबर दर्ज करें');
            }
        });

        // Login form submit
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const mobile = mobileInput.value;
            const otp = otpInput.value;
            
            console.log('Login attempt - Mobile:', mobile, 'OTP:', otp);
            
            // Check if mobile number is valid
            if (mobile.length !== 10) {
                alert('कृपया सही मोबाइल नंबर दर्ज करें');
                return;
            }
            
            // Check if OTP is correct (demo OTP is 123456)
            if (otp === '123456') {
                // Store user info
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('mobile', mobile);
                
                console.log('Login successful, redirecting...');
                
                // Show success message
                document.getElementById('successMessage').style.display = 'block';
                
                // Try multiple redirect methods to ensure it works
                try {
                    // Method 1: Direct assignment with delay
                    setTimeout(() => {
                        window.location.href = 'main.html';
                    }, 1000);
                } catch (error) {
                    console.error('Redirect error:', error);
                    // Method 2: Replace
                    window.location.replace('main.html');
                }
            } else {
                alert('गलत OTP! कृपया 123456 दर्ज करें');
            }
        });

        // Only allow numbers in mobile input
        mobileInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // Only allow numbers in OTP input
        otpInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
